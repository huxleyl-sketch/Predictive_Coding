<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Implementation</title>
    <link rel="icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="app"></div>
    <div id="actionRow">
      <label for="train">Train:</label>
      <input id="train" type="button" value="Train" />
      <label for="halt">Halt:</label>
      <input id="halt" type="button" value="Halt" />
      <label for="retry">Generate:</label>
      <input id="retry" type="button" value="Generate" />
    </div>
    <section id="configPanel" aria-label="Training configuration">
      <h3>Training Config</h3>
      <label for="cfgDebug">Debug logs</label>
      <input id="cfgDebug" type="checkbox" />
      <label for="cfgSignedOutput">Signed output mapping</label>
      <input id="cfgSignedOutput" type="checkbox" />
      <label for="cfgHaltNonFinite">Halt on non-finite</label>
      <input id="cfgHaltNonFinite" type="checkbox" checked />
      <label for="cfgBatchSize">Batch size</label>
      <input id="cfgBatchSize" type="number" value="128" min="1" step="1" />
      <label for="cfgValidationRatio">Validation ratio</label>
      <input id="cfgValidationRatio" type="number" value="0.2" min="0.05" max="0.45" step="0.01" />
      <label for="cfgEpochs">Epochs</label>
      <input id="cfgEpochs" type="number" value="40" min="1" step="1" />
      <label for="cfgInferSteps">Infer steps</label>
      <input id="cfgInferSteps" type="number" value="25" min="1" step="1" />
      <label for="cfgLearnSteps">Learn steps</label>
      <input id="cfgLearnSteps" type="number" value="25" min="1" step="1" />
      <label for="cfgInferLr">Infer LR</label>
      <input id="cfgInferLr" type="number" value="0.01" min="0.000001" step="0.0001" />
      <label for="cfgLearnLr">Learn LR</label>
      <input id="cfgLearnLr" type="number" value="0.0001" min="0.0000001" step="0.00001" />
      <label for="cfgGradClip">Gradient clip</label>
      <input id="cfgGradClip" type="number" value="3" min="0.01" step="0.1" />
    </section>
    <div id="debug">Wait</div>
    <canvas id="successCanvas" width="720" height="260" aria-label="Success indicator graph"></canvas>
    <canvas id="validationCanvas" width="720" height="260" aria-label="Validation accuracy graph"></canvas>
    <canvas id="errorCanvas" width="720" height="260" aria-label="Training error graph"></canvas>
    <canvas id="interpretationCanvas" width="720" height="260" aria-label="Prediction interpretation graph"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
